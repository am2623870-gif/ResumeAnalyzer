<!DOCTYPE html>
<html>

<head>

    <title>Resume Rankings</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#0f172a;
            color:white;
            padding:40px;
        }

        .card{
            background:#1e293b;
            border:none;
            border-radius:20px;
            padding:20px;
        }

        table{
            background:white;
        }

    </style>

</head>

<body>

<div class="container">

    <h1 class="text-center mb-4">
        🏆 Resume Rankings
    </h1>

    <div class="card">

        <table class="table table-striped">

            <thead>

                <tr>
                    <th>Rank</th>
                    <th>Resume Name</th>
                    <th>ATS Score</th>
                </tr>

            </thead>

            <tbody>

                {% for row in rankings %}

                <tr>

                    <td>
                        {{ loop.index }}
                    </td>

                    <td>
                        {{ row[0] }}
                    </td>

                    <td>
                        {{ row[1] }}
                    </td>

                </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>

    <br>

    <a href="/" class="btn btn-primary">
        Back Home
    </a>

</div>

</body>
</html>
