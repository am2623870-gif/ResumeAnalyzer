<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Analytics Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Inter',sans-serif;
        }

        body{
            min-height:100vh;
            background:linear-gradient(
                135deg,
                #020617,
                #0f172a,
                #1e293b
            );
            color:white;
        }

        .navbar{
            background:rgba(15,23,42,0.95);
            backdrop-filter:blur(10px);
            border-bottom:1px solid rgba(255,255,255,0.1);
        }

        .dashboard-title{
            font-size:3rem;
            font-weight:800;
            text-align:center;
            margin-top:40px;
            margin-bottom:40px;
        }

        .stats-card{

            background:rgba(255,255,255,0.08);

            backdrop-filter:blur(10px);

            border:1px solid rgba(255,255,255,0.1);

            border-radius:25px;

            padding:30px;

            text-align:center;

            transition:0.3s;

            box-shadow:
            0 10px 30px rgba(0,0,0,0.3);
        }

        .stats-card:hover{

            transform:translateY(-8px);

            box-shadow:
            0 20px 40px rgba(0,0,0,0.4);

        }

        .stats-title{
            color:#cbd5e1;
            font-size:1.1rem;
            margin-bottom:15px;
        }

        .stats-value{
            font-size:3rem;
            font-weight:800;
        }

        .total{
            color:#38bdf8;
        }

        .average{
            color:#22c55e;
        }

        .best{
            color:#f59e0b;
        }

        .chart-card{

            margin-top:40px;

            background:rgba(255,255,255,0.08);

            backdrop-filter:blur(10px);

            border-radius:25px;

            padding:30px;

            border:1px solid rgba(255,255,255,0.1);

            box-shadow:
            0 10px 30px rgba(0,0,0,0.3);

        }

        .chart-title{

            text-align:center;

            font-size:2rem;

            font-weight:700;

            margin-bottom:25px;

            color:white;

        }

        .chart-wrapper{

            background:white;

            padding:20px;

            border-radius:20px;

            height:500px;

        }

        .btn-custom{

            margin-top:30px;

            border-radius:12px;

            padding:12px 25px;

            font-weight:600;

        }

    </style>

</head>

<body>

<nav class="navbar navbar-dark px-4 py-3">

    <span class="navbar-brand fw-bold">
        🚀 AI Resume Analyzer by Aman Mishra
    </span>

    <div>

        <a href="/" class="btn btn-outline-light me-2">
            Home
        </a>

        <a href="/history" class="btn btn-outline-info me-2">
            History
        </a>

        <a href="/ranking" class="btn btn-outline-warning">
            Ranking
        </a>

    </div>

</nav>

<div class="container">

    <h1 class="dashboard-title">
        📊 Analytics Dashboard
    </h1>

    <div class="row g-4">

        <div class="col-md-4">

            <div class="stats-card">

                <div class="stats-title">
                    Total Analyses
                </div>

                <div class="stats-value total">
                    {{ total|default(0) }}
                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="stats-card">

                <div class="stats-title">
                    Average ATS
                </div>

                <div class="stats-value average">
                    {{ avg_ats|default(0) }}
                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="stats-card">

                <div class="stats-title">
                    Best ATS
                </div>

                <div class="stats-value best">
                    {{ best_ats|default(0) }}
                </div>

            </div>

        </div>

    </div>

    <div class="chart-card">

        <h2 class="chart-title">
            ATS Performance Overview
        </h2>

        <div class="chart-wrapper">

            <canvas id="atsChart"></canvas>

        </div>

    </div>

    <div class="text-center">

        <a href="/" class="btn btn-primary btn-custom">
            ← Back Home
        </a>

    </div>

</div>

<script>

const avgATS =
Number("{{ avg_ats|default(0) }}");

const bestATS =
Number("{{ best_ats|default(0) }}");

const ctx =
document.getElementById(
    "atsChart"
);

new Chart(ctx, {

    type: "bar",

    data: {

        labels: [
            "Average ATS",
            "Best ATS"
        ],

        datasets: [{

            label: "ATS Score",

            data: [
                avgATS,
                bestATS
            ],

            borderWidth: 2

        }]

    },

    options: {

        responsive: true,

        maintainAspectRatio: false,

        scales: {

            y: {

                beginAtZero: true,

                max: 100

            }

        }

    }

});

</script>

</body>
</html>
