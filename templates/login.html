<!DOCTYPE html>

<html lang="en">

<head>

```
<meta charset="UTF-8">
<title>Login | AI Resume Analyzer by AMAN</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
        font-family:'Inter',sans-serif;
        min-height:100vh;

        background:
        linear-gradient(
            135deg,
            #0f172a,
            #111827,
            #1e293b
        );

        display:flex;
        justify-content:center;
        align-items:center;
        color:white;
    }

    .login-card{

        width:450px;

        background:rgba(17,24,39,0.85);

        backdrop-filter:blur(20px);

        border:1px solid rgba(255,255,255,0.08);

        border-radius:20px;

        padding:40px;

        box-shadow:
        0 20px 50px rgba(0,0,0,0.4);

    }

    .logo{

        text-align:center;
        font-size:3rem;
        margin-bottom:10px;

    }

    h2{
        text-align:center;
        font-weight:700;
        margin-bottom:10px;
    }

    .subtitle{
        text-align:center;
        color:#94a3b8;
        margin-bottom:30px;
    }

    .form-control{

        background:#1e293b;
        border:1px solid #334155;
        color:white;
        padding:12px;

    }

    .form-control:focus{

        background:#1e293b;
        color:white;

        border-color:#38bdf8;

        box-shadow:
        0 0 15px rgba(56,189,248,0.4);

    }

    .btn-login{

        width:100%;

        padding:12px;

        border:none;

        border-radius:12px;

        font-weight:600;

        background:
        linear-gradient(
            135deg,
            #4f46e5,
            #06b6d4
        );

        color:white;

    }

    .btn-login:hover{
        transform:translateY(-2px);
    }

    a{
        text-decoration:none;
    }

    .footer-text{
        text-align:center;
        margin-top:20px;
        color:#cbd5e1;
    }

</style>
```

</head>

<body>

```
<div class="login-card">

    <div class="logo">
        🚀
    </div>

    <h2>
        Welcome Back
    </h2>

    <p class="subtitle">
        Login to continue analyzing resumes
    </p>

    <form method="POST">

        <div class="mb-3">

            <input
                type="email"
                name="email"
                class="form-control"
                placeholder="Enter Email"
                required>

        </div>

        <div class="mb-4">

            <input
                type="password"
                name="password"
                class="form-control"
                placeholder="Enter Password"
                required>

        </div>

        <button
            type="submit"
            class="btn-login">

            Login

        </button>

    </form>

    <div class="footer-text">

        Don't have an account?

        <a href="/register"
           class="text-info">

           Register

        </a>

    </div>

</div>
```

</body>

</html>
